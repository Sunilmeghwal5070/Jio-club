<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Gems 2 - Premium Slot</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

    <!-- FIREBASE SDKS -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lilita+One&family=Russo+One&display=swap');

        :root {
            --bg-image-url: url('/assets/images.bg.png'); 
            
            --jungle-dark: #0a1f0a; --jungle-mid: #143314;
            --stone-light: #bba585; --stone-dark: #6e5c47;
            --gold-light: #ffea7c; --gold-mid: #ffcc00; --gold-dark: #b37700;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background-color: #000;
            font-family: 'Lilita One', cursive; color: white; 
            user-select: none; -webkit-user-select: none; touch-action: none;
        }

        /* 🌟 BACKGROUND IMAGE WITH PANNING ANIMATION 🌟 */
        .game-bg {
            position: absolute; inset: -5%; z-index: -10;
            background-image: var(--bg-image-url);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.6) contrast(1.2);
            animation: bgPan 20s ease-in-out infinite alternate;
        }

        @keyframes bgPan {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-15px, -10px); }
        }

        .ambient-glow {
            position: absolute; inset: 0; z-index: -9;
            background: radial-gradient(circle at center, rgba(34,139,34,0.1) 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* 🌟 SWAYING VINES ANIMATION 🌟 */
        .vines {
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%; z-index: -5;
            background-image: radial-gradient(ellipse at 10% -10%, rgba(34, 139, 34, 0.4) 0%, transparent 40%),
                              radial-gradient(ellipse at 90% -10%, rgba(34, 139, 34, 0.4) 0%, transparent 40%);
            animation: swayVines 6s ease-in-out infinite alternate;
            transform-origin: top center;
        }
        @keyframes swayVines {
            0% { transform: rotate(-1deg); }
            100% { transform: rotate(1deg); }
        }

        .logo-text-1 {
            font-family: 'Cinzel', serif; font-weight: 900;
            background: linear-gradient(to bottom, #fffde4 0%, #ffdf00 40%, #d4af37 60%, #b8860b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.8)); -webkit-text-stroke: 1px #5c3a00;
        }

        /* 🌟 SCREEN SHAKE ANIMATION 🌟 */
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .shake-active { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        /* 🌟 WIN GLOW BURST BEHIND MACHINE 🌟 */
        .win-glow-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 60%);
            z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .win-glow-active { animation: glowBurst 1s ease-out forwards; }
        @keyframes glowBurst {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* HARDWARE ACCELERATED REELS */
        .slot-machine-wrapper {
            position: relative; width: 100%; max-width: 420px;
            background: linear-gradient(to bottom, #8f6e4a, #523b24);
            border: 6px solid #3d2b19; border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 15px rgba(0,0,0,0.8);
            padding: 4px; z-index: 20; transition: transform 0.1s;
        }

        .reels-container {
            display: grid; grid-template-columns: 1fr 1fr 1fr 0.8fr; gap: 4px;
            background: #2a1f16; border: 3px solid #1a120d; border-radius: 4px;
            height: 260px; overflow: hidden; position: relative;
        }
        .reel {
            position: relative; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(40,30,20,0.2) 20%, rgba(40,30,20,0.2) 80%, rgba(0,0,0,0.8) 100%);
            border-right: 2px solid #1a120d; overflow: hidden;
        }
        .reel:last-child { border-right: none; background: #3d1414; }
        
        .symbol-strip {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; flex-direction: column;
            will-change: transform; transform: translate3d(0, 0, 0);
        }
        .symbol-box {
            height: 86.66px; width: 100%; display: flex; justify-content: center; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.05);
            position: relative; transform: translateZ(0);
        }

        .multiplier-highlight {
            position: absolute; top: 33.33%; right: 0; width: 22.5%; height: 33.33%;
            border: 4px solid var(--gold-mid); border-radius: 4px; z-index: 10;
            box-shadow: 0 0 15px var(--gold-mid), inset 0 0 15px var(--gold-mid); pointer-events: none;
        }

        /* SMOOTH ANIMATIONS */
        @keyframes slideDown { 0% { transform: translate3d(0, -1040px, 0); filter: blur(2px); } 100% { transform: translate3d(0, 0, 0); filter: blur(0px); } }
        .anim-slide { animation: slideDown 1s cubic-bezier(0.1, 0.7, 0.1, 1) forwards; }

        @keyframes highlightPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.15); filter: brightness(1.6) drop-shadow(0 0 20px #ffcc00); z-index: 15; }
        }
        .highlight-active { animation: highlightPulse 0.5s ease-in-out infinite; z-index: 15; }

        /* MULTIPLIER MIXING ANIMATION (WIN BANNER) */
        .win-banner-container {
            position: absolute; left: 5%; right: 28%; height: 50px;
            background: linear-gradient(to bottom, #d92b2b, #8a0c0c);
            border: 3px solid #ffcc00; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 25;
            font-family: 'Russo One', sans-serif; font-size: 26px; color: yellow; text-shadow: 0 2px 4px #000;
            animation: bannerPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes bannerPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .banner-flash { animation: flashWhite 0.4s ease-out; }
        @keyframes flashWhite {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(2) contrast(1.5); transform: scale(1.1); box-shadow: 0 0 40px yellow; }
            100% { filter: brightness(1); transform: scale(1); }
        }

        .flying-multiplier {
            position: absolute; right: -70px; top: 50%; transform: translateY(-50%) scale(1.5);
            width: 75px; height: 75px; z-index: 30; pointer-events: none;
            animation: slamMerge 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slamMerge {
            0% { transform: translateY(-50%) scale(0.5) translateX(120px); opacity: 0; }
            40% { transform: translateY(-50%) scale(1.6) translateX(20px); opacity: 1; filter: brightness(1.2); }
            80% { transform: translateY(-50%) scale(1.2) translateX(0px); opacity: 1; filter: brightness(1); }
            100% { transform: translateY(-50%) scale(1.5) translateX(-20px); opacity: 0; filter: brightness(3); }
        }

        /* BALANCE ANIMATION */
        .balance-box { transition: all 0.2s; }
        .balance-update { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; transform: scale(1.1); }

        /* BOTTOM CONTROLS */
        .bottom-panel {
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%234a3623"/><path d="M0 0 L100 100 M100 0 L0 100" stroke="%23382717" stroke-width="2"/></svg>');
            border-top: 8px solid #2e8b57; box-shadow: 0 -10px 20px rgba(0,0,0,0.8);
            position: absolute; bottom: 0; width: 100%; height: 100px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 30;
        }

        .spin-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4ade80 0%, #16a34a 50%, #14532d 100%);
            border: 4px solid #14532d; box-shadow: 0 8px 15px rgba(0,0,0,0.7), inset 0 4px 6px rgba(255,255,255,0.4);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Lilita One', cursive; font-size: 22px; color: #fff; text-shadow: 0 2px 4px #000;
            transition: all 0.1s; cursor: pointer; text-transform: uppercase;
        }
        .spin-btn:active { transform: scale(0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.7); }
        .spin-btn.btn-stop { background: radial-gradient(circle at 30% 30%, #f87171 0%, #dc2626 50%, #7f1d1d 100%); border-color: #7f1d1d; }

        .bet-box { background: #1a120d; border: 2px solid #523b24; border-radius: 8px; display: flex; align-items: center; padding: 5px; box-shadow: inset 0 0 10px #000; }
        .bet-btn { background: linear-gradient(to bottom, #d4af37, #b8860b); color: #000; width: 30px; height: 30px; border-radius: 4px; font-size: 20px; font-weight: bold; display: flex; justify-content: center; align-items: center; border: 1px solid #ffe680; cursor: pointer;}
        .bet-btn:active { filter: brightness(0.8); transform: scale(0.95); }

        .mult-coin {
            width: 80%; height: 80%; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-family: 'Russo One', sans-serif; font-size: 26px; font-weight: bold;
            border: 3px solid #ffcc00; box-shadow: 0 4px 8px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.5);
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 3px 5px rgba(0,0,0,0.8);
        }
        .mult-1x { background: radial-gradient(circle, #4b5563, #1f2937); color: #9ca3af; border-color: #9ca3af;}
        .mult-2x { background: radial-gradient(circle, #22c55e, #14532d); color: #fff; }
        .mult-3x { background: radial-gradient(circle, #3b82f6, #1e3a8a); color: #fff; }

        #fx-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        /* UI Animations for Modals */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
        .animate-slide-in-right { animation: slideInRight 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div class="game-bg"></div>
    <div class="ambient-glow"></div>
    <div class="vines"></div>
    <canvas id="fx-canvas"></canvas>
    <div id="root" class="relative w-full h-full overflow-hidden"></div>

    <script type="text/babel">
        // ==========================================
        // FIREBASE INITIALIZATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCCd0sxHVTqBG3I6MhvP4mebxUS7EofkTo",
            authDomain: "inr-club-d4500.firebaseapp.com",
            databaseURL: "https://inr-club-d4500-default-rtdb.firebaseio.com",
            projectId: "inr-club-d4500",
            storageBucket: "inr-club-d4500.firebasestorage.app",
            messagingSenderId: "496374937195",
            appId: "1:496374937195:web:a0d7fc817e1b02fe23a32e"
        };

        if (!window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
        }
        const database = window.firebase.database();
        const activePhone = localStorage.getItem('user_phone') || localStorage.getItem('inr_club_active_phone');

        if (!activePhone) {
            window.location.href = '/';
        }

        // ==========================================
        // UI ICONS
        // ==========================================
        const Icons = {
            Menu: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
            Close: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        };

        // ==========================================
        // 1. FAST FX ENGINE
        // ==========================================
        class FXEngine {
            constructor() {
                this.canvas = null; this.ctx = null; 
                this.particles = []; this.fireflies = [];
                this.audioCtx = null; this.isAudioInit = false; 
                this.loopStarted = false;
                this.soundEnabled = true; // NEW: Sound toggle flag
                this.resizeCanvas = this.resizeCanvas.bind(this);
            }
            init() {
                if(!this.canvas) {
                    this.canvas = document.getElementById('fx-canvas');
                    this.ctx = this.canvas.getContext('2d');
                    window.addEventListener('resize', this.resizeCanvas);
                    this.resizeCanvas();
                }
                if (!this.isAudioInit) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this.isAudioInit = true;
                }
                if (this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume();
                
                if(this.fireflies.length === 0) {
                    for(let i=0; i<40; i++) {
                        this.fireflies.push({
                            x: Math.random() * window.innerWidth,
                            y: Math.random() * window.innerHeight,
                            vx: (Math.random() - 0.5) * 0.5,
                            vy: (Math.random() - 0.5) * 0.5,
                            size: Math.random() * 2 + 0.5,
                            life: Math.random() * Math.PI * 2 
                        });
                    }
                }
                if(!this.loopStarted) {
                    this.loopStarted = true;
                    this.renderLoop();
                }
            }
            resizeCanvas() { if(this.canvas) { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; } }
            
            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                return this.soundEnabled;
            }

            createExplosion(x, y, color) {
                for (let i = 0; i < 25; i++) {
                    const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 8 + 2; 
                    this.particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, decay: Math.random() * 0.04 + 0.02, size: Math.random() * 5 + 3, color });
                }
            }

            createCoinShower() {
                for (let i = 0; i < 40; i++) {
                    this.particles.push({ 
                        x: window.innerWidth / 2 + (Math.random() * 150 - 75), 
                        y: window.innerHeight / 2.5, 
                        vx: (Math.random() - 0.5) * 15, vy: Math.random() * -18 - 2, 
                        life: 1.2, decay: 0.015, size: Math.random() * 6 + 4, color: 'rgb(255, 215, 0)' 
                    });
                }
            }

            renderLoop() {
                if(!this.ctx) return;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.globalCompositeOperation = 'screen';
                this.fireflies.forEach(f => {
                    f.x += f.vx; f.y += f.vy; f.life += 0.05;
                    if(f.x < 0) f.x = this.canvas.width; if(f.x > this.canvas.width) f.x = 0;
                    if(f.y < 0) f.y = this.canvas.height; if(f.y > this.canvas.height) f.y = 0;
                    
                    const alpha = (Math.sin(f.life) + 1) / 2 * 0.6 + 0.1; 
                    this.ctx.beginPath(); this.ctx.arc(f.x, f.y, f.size, 0, Math.PI*2);
                    this.ctx.fillStyle = `rgba(255, 230, 100, ${alpha})`; this.ctx.fill();
                });

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    this.ctx.fillStyle = p.color.replace('rgb', 'rgba').replace(')', `, ${p.life})`); 
                    this.ctx.fill();
                    p.life -= p.decay;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
                
                this.ctx.globalCompositeOperation = 'source-over';
                requestAnimationFrame(() => this.renderLoop());
            }

            playTone(freq, type, duration, vol=0.1) {
                if (!this.soundEnabled || !this.audioCtx) return; // Sound check
                try {
                    const osc = this.audioCtx.createOscillator(); const gain = this.audioCtx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
                    gain.gain.setValueAtTime(vol, this.audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.audioCtx.destination);
                    osc.start(); osc.stop(this.audioCtx.currentTime + duration);
                } catch(e) {}
            }
            playMenuClick() { this.playTone(800, 'sine', 0.1, 0.1); }
            playSpinStart() { this.playTone(150, 'sawtooth', 0.5, 0.05); } 
            playReelStop() { this.playTone(200, 'square', 0.1, 0.1); } 
            playHighlight() { this.playTone(600, 'sine', 0.5, 0.1); } 
            playMixExplosion() { this.playTone(300, 'square', 0.4, 0.15); setTimeout(()=>this.playTone(150, 'sawtooth', 0.2, 0.2), 50); }
            playWin() { [440, 554, 659, 880].forEach((f, i) => setTimeout(() => this.playTone(f, 'sine', 0.3, 0.1), i * 100)); }
        }
        const fx = new FXEngine();

        // ==========================================
        // GAME LOGIC
        // ==========================================
        const SYMBOLS_DB = {
            wild:  { id: 'wild',  payout: 3.5, icon: '🌟', isWild: true },
            red:   { id: 'red',   payout: 2.5, icon: '🍎' },   
            blue:  { id: 'blue',  payout: 2.0, icon: '💎' },
            green: { id: 'green', payout: 1.5, icon: '🍀' },
            a:     { id: 'a',     payout: 1.0, icon: 'A' },
            k:     { id: 'k',     payout: 0.8, icon: 'K' },
            q:     { id: 'q',     payout: 0.5, icon: 'Q' },
            j:     { id: 'j',     payout: 0.2, icon: 'J' }  
        };
        const MULTIPLIERS_DB = { m1: { id: 'm1', mult: 1, css: 'mult-1x' }, m2: { id: 'm2', mult: 2, css: 'mult-2x' }, m3: { id: 'm3', mult: 3, css: 'mult-3x' }, m5: { id: 'm5', mult: 5, css: 'mult-5x' }, m10: { id: 'm10', mult: 10, css: 'mult-10x' } };
        const PAYLINES = [[{c:0, r:1}, {c:1, r:1}, {c:2, r:1}], [{c:0, r:0}, {c:1, r:0}, {c:2, r:0}], [{c:0, r:2}, {c:1, r:2}, {c:2, r:2}], [{c:0, r:0}, {c:1, r:1}, {c:2, r:2}], [{c:0, r:2}, {c:1, r:1}, {c:2, r:0}]];
        const getRandomSymbol = () => { const keys = Object.keys(SYMBOLS_DB); return SYMBOLS_DB[keys[Math.floor(Math.random() * keys.length)]]; };
        const getRandomMultiplier = () => { const keys = Object.keys(MULTIPLIERS_DB); return MULTIPLIERS_DB[keys[Math.floor(Math.random() * keys.length)]]; };

        const checkWin = (reels) => {
            for(let i=0; i<PAYLINES.length; i++) {
                const line = PAYLINES[i];
                const types = [reels[line[0].c][line[0].r], reels[line[1].c][line[1].r], reels[line[2].c][line[2].r]].map(s => s.isWild ? 'wild' : s.id);
                const unique = [...new Set(types.filter(t => t !== 'wild'))];
                if (unique.length <= 1) return { isWin: true, line: line, type: unique.length===0?'wild':unique[0] };
            }
            return { isWin: false };
        };

        const forceLosingReels = () => {
            let reels; let attempts = 0;
            while(attempts < 20) {
                reels = [];
                for(let c=0; c<3; c++) reels.push([getRandomSymbol(), getRandomSymbol(), getRandomSymbol()]);
                reels.push([getRandomMultiplier(), getRandomMultiplier(), getRandomMultiplier()]);
                if (!checkWin(reels).isWin) return reels; attempts++;
            }
            return [[SYMBOLS_DB.q, SYMBOLS_DB.j, SYMBOLS_DB.k], [SYMBOLS_DB.a, SYMBOLS_DB.q, SYMBOLS_DB.j], [SYMBOLS_DB.k, SYMBOLS_DB.a, SYMBOLS_DB.q], [MULTIPLIERS_DB.m1, MULTIPLIERS_DB.m2, MULTIPLIERS_DB.m1]];
        };

        const forceWinningReels = () => {
            let reels = forceLosingReels();
            const line = PAYLINES[Math.floor(Math.random() * PAYLINES.length)];
            const winTypeProb = Math.random();
            if (winTypeProb < 0.89) {
                const minOptions = [{ sym: 'q', mult: 'm1' }, { sym: 'j', mult: 'm3' }, { sym: 'k', mult: 'm1' }, { sym: 'a', mult: 'm1' }, { sym: 'q', mult: 'm2' }, { sym: 'q', mult: 'm3' }, { sym: 'green', mult: 'm1' }];
                const choice = minOptions[Math.floor(Math.random() * minOptions.length)];
                line.forEach(pt => reels[pt.c][pt.r] = SYMBOLS_DB[choice.sym]); reels[3][1] = MULTIPLIERS_DB[choice.mult];
            } else {
                const maxOptions = [{ sym: 'blue', mult: 'm1' }, { sym: 'a', mult: 'm2' }, { sym: 'k', mult: 'm3' }, { sym: 'red', mult: 'm1' }, { sym: 'green', mult: 'm2' }, { sym: 'a', mult: 'm3' }, { sym: 'wild', mult: 'm1' }];
                const choice = maxOptions[Math.floor(Math.random() * maxOptions.length)];
                line.forEach(pt => reels[pt.c][pt.r] = SYMBOLS_DB[choice.sym]); reels[3][1] = MULTIPLIERS_DB[choice.mult];
            }
            return reels;
        };

        const generateStrip = (newCol, oldCol, isMult) => { let strip = [...newCol]; for(let i=0; i<9; i++) strip.push(isMult ? getRandomMultiplier() : getRandomSymbol()); strip.push(...oldCol); return strip; };

        const SlotSymbol = ({ data, type }) => {
            if (type === 'mult') {
                return <div className={`mult-coin ${data.css}`}>{data.mult}X</div>;
            }
            
            const isText = ['a', 'k', 'q', 'j'].includes(data.id);
            return (
                <div className="w-[85%] h-[85%] relative flex justify-center items-center rounded-[20%] shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] border-2 border-[rgba(255,255,255,0.2)]"
                     style={{
                         background: isText ? 'linear-gradient(135deg, #2c3e50, #000000)' : 'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(0,0,0,0.5))',
                         backgroundColor: data.id === 'red' ? '#ff0044' : data.id === 'blue' ? '#0055ff' : data.id === 'green' ? '#00ff44' : data.id === 'wild' ? '#ffaa00' : 'transparent'
                     }}>
                    <span style={{ fontSize: isText ? '4rem' : '4rem', fontWeight: '900', color: isText ? '#fff' : 'transparent', textShadow: isText ? '0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.3)' : '0 0 0 white' }}>
                        {data.icon}
                    </span>
                </div>
            );
        };

        const useCountUp = (endValue, duration) => {
            const [count, setCount] = React.useState(endValue);
            const [isUpdating, setIsUpdating] = React.useState(false);
            const prevEnd = React.useRef(endValue);
            React.useEffect(() => {
                if(endValue === prevEnd.current) return;
                setIsUpdating(true); let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    setCount(prevEnd.current + progress * (endValue - prevEnd.current));
                    if (progress < 1) { window.requestAnimationFrame(step); } else { setCount(endValue); prevEnd.current = endValue; setIsUpdating(false); }
                };
                window.requestAnimationFrame(step);
            }, [endValue, duration]);
            return { count, isUpdating };
        };


        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        const App = () => {
            const betOptions = [1, 2, 5, 10, 20, 50, 100];
            const [betIdx, setBetIdx] = React.useState(0);
            const bet = betOptions[betIdx];
            
            const [balance, setBalance] = React.useState(0); 
            const { count: displayBalance, isUpdating: isBalanceMixing } = useCountUp(balance, 1000); 
            
            const [currentReels, setCurrentReels] = React.useState(forceLosingReels());
            const [strips, setStrips] = React.useState([]);
            const [spinTrigger, setSpinTrigger] = React.useState(0); 
            
            const [isSpinning, setIsSpinning] = React.useState(false);
            const [isAuto, setIsAuto] = React.useState(false);
            const autoRef = React.useRef(false);

            const [highlightPoints, setHighlightPoints] = React.useState([]); 
            const [winInfo, setWinInfo] = React.useState(null); 
            const [multAnim, setMultAnim] = React.useState(null); 
            
            const [isShaking, setIsShaking] = React.useState(false);
            const [winGlow, setWinGlow] = React.useState(false);

            // NEW UI STATES
            const [menuOpen, setMenuOpen] = React.useState(false);
            const [howToPlayOpen, setHowToPlayOpen] = React.useState(false);
            const [isSoundOn, setIsSoundOn] = React.useState(true);

            const lossCount = React.useRef(0);
            const targetLosses = React.useRef(Math.floor(Math.random() * 2) + 1);

            // Fetch Real-time Balance
            React.useEffect(() => {
                if (!activePhone) return;
                const userRef = database.ref('users/' + activePhone);
                const handleValue = (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const bal = data.balance !== undefined ? data.balance : data.totalBalance;
                        if (bal !== undefined) {
                            setBalance(Number(bal));
                        }
                    }
                };
                userRef.on('value', handleValue);
                return () => userRef.off('value', handleValue);
            }, []);

            const updateBalance = (delta) => {
                setBalance(prev => {
                    const newBalance = parseFloat((prev + delta).toFixed(2));
                    if (activePhone) database.ref('users/' + activePhone).update({ balance: newBalance });
                    return newBalance;
                });
            };

            // NEW CODE: PUSH GAME HISTORY TO FIREBASE
            const pushGameHistoryToFirebase = (betAmt, winAmt, status, multiplierText) => {
                if (!activePhone) return;
                const userGamesHistoryRef = database.ref(`users/${activePhone}/history/games`);
                const uniqueKey = Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                const netAmt = status === 'Succeed' ? (winAmt - betAmt) : -betAmt;
                const periodStr = Math.floor(Date.now() / 1000).toString().slice(-6); 

                userGamesHistoryRef.child(uniqueKey).set({
                    game: 'Fortune Gems 2',
                    period: periodStr,
                    selection: status === 'Succeed' ? multiplierText : 'Lost',
                    amount: betAmt,
                    status: status,
                    net: netAmt,
                    date: new Date().toLocaleString(),
                    timestamp: Date.now()
                });
            };

            React.useEffect(() => {
                const initStrips = currentReels.map(col => { let arr = [...col]; while(arr.length<15) arr.push(col[0]); return arr; });
                setStrips(initStrips);
                const startAudio = () => fx.init();
                window.addEventListener('pointerdown', startAudio, { once: true });
                return () => window.removeEventListener('pointerdown', startAudio);
            }, []);

            const triggerShake = (duration = 500) => { setIsShaking(true); setTimeout(() => setIsShaking(false), duration); };

            const triggerSpin = () => {
                if (isSpinning) return;
                if (balance < bet) { setIsAuto(false); autoRef.current = false; alert("Insufficient Balance!"); return; }

                fx.init(); fx.playSpinStart();
                updateBalance(-bet);
                
                setIsSpinning(true); setWinInfo(null); setHighlightPoints([]); setMultAnim(null); setWinGlow(false);
                
                let isWinSpin = false;
                if (lossCount.current >= targetLosses.current) {
                    isWinSpin = true; lossCount.current = 0; targetLosses.current = Math.floor(Math.random() * 2) + 1; 
                } else {
                    isWinSpin = false; lossCount.current++;
                }
                
                let newOutcome = isWinSpin ? forceWinningReels() : forceLosingReels();
                const newStrips = newOutcome.map((col, i) => generateStrip(col, currentReels[i], i===3));
                
                setStrips(newStrips); setSpinTrigger(prev => prev + 1); 

                setTimeout(() => fx.playReelStop(), 800);
                setTimeout(() => fx.playReelStop(), 900);
                setTimeout(() => fx.playReelStop(), 1000);
                setTimeout(() => { fx.playReelStop(); setCurrentReels(newOutcome); processOutcome(newOutcome); }, 1100); 
            };

            const processOutcome = (reels) => {
                const winData = checkWin(reels);

                if (winData.isWin) {
                    fx.playHighlight(); setHighlightPoints(winData.line);
                    triggerShake(300); setWinGlow(true);
                    fx.createExplosion(window.innerWidth/2, window.innerHeight/2, 'rgb(0, 255, 100)');

                    setTimeout(() => {
                        const multiplierObj = reels[3][1];
                        const baseWin = SYMBOLS_DB[winData.type].payout * bet;
                        const finalWin = baseWin * multiplierObj.mult;
                        
                        let bannerY = "33%"; 
                        if(winData.line[0].r === 0 && winData.line[2].r === 0) bannerY = "0%";
                        if(winData.line[0].r === 2 && winData.line[2].r === 2) bannerY = "66%";
                        
                        setWinInfo({ amount: baseWin, bannerY: bannerY, flash: false });
                        setHighlightPoints([]); 
                        
                        if (multiplierObj.mult > 1) {
                            setTimeout(() => {
                                setMultAnim({ active: true, multObj: multiplierObj });
                                setTimeout(() => {
                                    fx.playMixExplosion(); fx.playWin();
                                    updateBalance(finalWin);
                                    
                                    // PUSH WIN TO FIREBASE
                                    pushGameHistoryToFirebase(bet, finalWin, 'Succeed', `${multiplierObj.mult}x`);

                                    triggerShake(600); fx.createCoinShower();
                                    setWinInfo({ amount: finalWin, bannerY: bannerY, flash: true });
                                    setMultAnim(null); 
                                    setTimeout(() => completeSpin(true), 1500);
                                }, 600);
                            }, 200); 
                        } else {
                            fx.playWin(); updateBalance(finalWin); 
                            
                            // PUSH WIN TO FIREBASE
                            pushGameHistoryToFirebase(bet, finalWin, 'Succeed', `1x`);

                            setTimeout(() => completeSpin(true), 1200);
                        }
                    }, 1000); 
                } else { 
                    // PUSH LOSS TO FIREBASE
                    pushGameHistoryToFirebase(bet, 0, 'Failed', '0x');
                    completeSpin(false); 
                }
            };

            const completeSpin = (won) => {
                setIsSpinning(false);
                if (autoRef.current) setTimeout(() => { if (autoRef.current) triggerSpin(); }, won ? 2500 : 500);
            };

            const toggleAuto = () => { fx.init(); const newVal = !isAuto; setIsAuto(newVal); autoRef.current = newVal; if (newVal && !isSpinning) triggerSpin(); };
            const modifyBet = (dir) => { if(!isSpinning) { fx.init(); fx.playReelStop(); let newIdx = betIdx + dir; if(newIdx >= 0 && newIdx < betOptions.length) setBetIdx(newIdx); } };

            return (
                <div className={`flex flex-col w-full h-full max-w-md mx-auto relative z-10 transition-transform ${isShaking ? 'shake-active' : ''}`}>
                    
                    {/* TOP HEADER */}
                    <div className="flex justify-between items-center px-4 mt-2 mb-2 z-20">
                        <div className="flex flex-col text-center mt-2 cursor-pointer active:scale-95 transition-transform" onClick={() => window.location.href='/'}>
                            <span className="logo-text-1 text-2xl tracking-wider leading-none">GEMS II</span>
                            <span className="logo-text-1 text-3xl tracking-widest leading-none mt-[-5px]">FORTUNE</span>
                        </div>
                        
                        <div className="flex items-center gap-2">
                            <div className={`bg-black/80 border-2 rounded-full px-3 py-1 flex items-center gap-2 shadow-lg balance-box ${isBalanceMixing ? 'border-green-500' : 'border-yellow-600'}`}>
                                <div className="w-3.5 h-3.5 rounded-full bg-yellow-400 shadow-[0_0_5px_yellow]"></div>
                                <span className={`font-mono text-base font-bold transition-all ${isBalanceMixing ? 'balance-update' : 'text-yellow-400'}`}>
                                    {displayBalance.toFixed(2)}
                                </span>
                            </div>
                            
                            {/* MENU BUTTON */}
                            <button 
                                onClick={() => { fx.playMenuClick(); setMenuOpen(true); }} 
                                className="bg-gradient-to-b from-[#ffea7c] to-[#b37700] border-2 border-[#5c3a00] rounded-full p-1 text-black shadow-lg active:scale-95 transition-transform"
                            >
                                <Icons.Menu />
                            </button>
                        </div>
                    </div>

                    {/* SLOT MACHINE AREA */}
                    <div className="px-2 relative z-10 flex-1 flex flex-col justify-center items-center pb-8">
                        <div className="w-full max-w-[420px] bg-[#3d2b19] border-y-4 border-[#1a120d] text-[#ffcc00] text-[12px] py-1.5 font-bold tracking-widest text-center z-10 shadow-lg relative flex items-center justify-center uppercase rounded-t-lg">
                            <span className="absolute -top-[14px] left-0 w-full flex justify-around text-[22px] drop-shadow-md pointer-events-none">🌿🌿🌿🌿🌿🌿🌿🌿🌿</span>
                            System Active - Good Luck
                        </div>

                        <div className="slot-machine-wrapper mt-0" id="reel-board">
                            <div className={`win-glow-bg ${winGlow ? 'win-glow-active' : ''}`}></div>
                            <div className="absolute -top-6 right-2 bg-[#3d2b19] border-2 border-[#1a120d] text-[#ffcc00] text-[10px] px-2 py-1 uppercase tracking-widest rounded shadow-md z-20">
                                Win Multiplier
                            </div>

                            <div className="reels-container">
                                <div className="multiplier-highlight"></div>
                                {strips.map((col, cIdx) => (
                                    <div key={cIdx} className="reel">
                                        <div key={`${spinTrigger}-${cIdx}`} className={`symbol-strip ${isSpinning ? 'anim-slide' : ''}`} style={{ animationDelay: `${cIdx * 0.1}s`, animationDuration: `${0.8 + cIdx*0.1}s` }}>
                                            {col.map((sym, rIdx) => {
                                                const isTopCell = rIdx < 3;
                                                const isHighlighted = isTopCell && highlightPoints.some(pt => pt.c === cIdx && pt.r === rIdx);
                                                const isWinningMult = isTopCell && winInfo && cIdx === 3 && rIdx === 1;
                                                return (
                                                    <div key={rIdx} className={`symbol-box ${isHighlighted ? 'highlight-active' : ''} ${(isWinningMult || (winInfo && isHighlighted)) ? 'win-anim' : ''}`}>
                                                        <SlotSymbol data={sym} type={cIdx === 3 ? 'mult' : 'regular'} />
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            {winInfo && (
                                <div className={`win-banner-container ${winInfo.flash ? 'banner-flash' : ''}`} style={{ top: winInfo.bannerY }}>
                                    {winInfo.amount.toFixed(2)}
                                    {multAnim && multAnim.active && (
                                        <div className="flying-multiplier"><SlotSymbol data={multAnim.multObj} type="mult" /></div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* BOTTOM PANEL */}
                    <div className="bottom-panel shrink-0">
                        <div className="flex flex-col items-center">
                            <button onClick={toggleAuto} className={`w-14 h-14 rounded-full border-4 shadow-lg flex items-center justify-center transition-all ${isAuto ? 'bg-red-800 border-red-400' : 'bg-[#4a3623] border-[#6e5c47] active:scale-90'}`}>
                                {isAuto ? <span className="text-white text-xl">⬛</span> : <span className="text-white text-3xl mb-1">↻</span>}
                            </button>
                        </div>

                        <div className="flex flex-col items-center mb-4">
                            <span className="text-white text-sm tracking-widest shadow-black drop-shadow-md mb-1 uppercase">Total Bet</span>
                            <div className="bet-box gap-3">
                                <button onClick={()=>modifyBet(-1)} className="bet-btn">-</button>
                                <span className="text-white font-mono text-xl w-8 text-center">{bet}</span>
                                <button onClick={()=>modifyBet(1)} className="bet-btn">+</button>
                                <div className="bg-yellow-600 text-[10px] text-black font-bold px-1 py-1 rounded ml-1 border border-yellow-300 flex flex-col items-center leading-none shadow-[0_0_5px_yellow]"><span>EX</span></div>
                            </div>
                        </div>

                        <div className="flex flex-col items-center relative bottom-2">
                            <button onClick={() => { isAuto ? toggleAuto() : triggerSpin(); }} disabled={isSpinning && !isAuto} className={`spin-btn ${isAuto ? 'btn-stop' : ''} ${isSpinning && !isAuto ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                {isAuto ? 'STOP' : 'SPIN'}
                            </button>
                            <div className="absolute -left-4 bottom-0 text-3xl pointer-events-none drop-shadow-[0_2px_2px_#000]">🌿</div>
                            <div className="absolute -right-4 bottom-0 text-3xl pointer-events-none transform scale-x-[-1] drop-shadow-[0_2px_2px_#000]">🌿</div>
                        </div>
                    </div>

                    {/* SLIDE-IN MENU OVERLAY */}
                    {menuOpen && (
                        <div className="absolute inset-0 z-50 bg-black/80 flex justify-end animate-fade-in" onClick={() => setMenuOpen(false)}>
                            <div className="w-64 bg-[#1a120d] h-full border-l-2 border-[#523b24] shadow-2xl p-4 flex flex-col gap-4 animate-slide-in-right" onClick={e => e.stopPropagation()}>
                                
                                <div className="flex justify-between items-center border-b-2 border-[#3d2b19] pb-3">
                                    <span className="text-[#ffcc00] font-black text-xl tracking-wider font-['Cinzel']">MENU</span>
                                    <button 
                                        onClick={() => { fx.playMenuClick(); setMenuOpen(false); }} 
                                        className="bg-red-700 hover:bg-red-800 text-white font-bold px-2 py-1 rounded-lg text-xs flex items-center gap-1 active:scale-95 shadow-lg border border-red-500 transition-all"
                                    >
                                        <Icons.Close />
                                    </button>
                                </div>
                                
                                {/* SOUND TOGGLE */}
                                <div className="flex justify-between items-center bg-[#2a1f16] p-3 rounded-xl border border-[#3d2b19] shadow-inner">
                                    <span className="text-[#bba585] font-bold text-sm">Sound Effects</span>
                                    <div onClick={() => { setIsSoundOn(fx.toggleSound()); fx.playMenuClick(); }} className={`w-12 h-6 flex items-center rounded-full p-1 cursor-pointer transition-colors duration-300 ${isSoundOn ? 'bg-green-600' : 'bg-gray-600'}`}>
                                        <div className={`bg-white w-4 h-4 rounded-full shadow-sm transform transition-transform duration-300 ${isSoundOn ? 'translate-x-6' : 'translate-x-0'}`}></div>
                                    </div>
                                </div>

                                {/* HOW TO PLAY BUTTON */}
                                <button onClick={() => { fx.playMenuClick(); setHowToPlayOpen(true); setMenuOpen(false); }} className="w-full text-left bg-[#2a1f16] p-3 rounded-xl border border-[#3d2b19] text-[#bba585] font-bold text-sm hover:text-white transition-colors active:scale-95 shadow-inner">
                                    How To Play ?
                                </button>

                                {/* EXIT BUTTON */}
                                <button onClick={() => { fx.playTone(400, 'sawtooth', 0.1); window.location.href = '/'; }} className="w-full text-center mt-auto bg-gradient-to-r from-red-800 to-red-600 p-3 rounded-xl text-white font-black text-sm shadow-lg active:scale-95 border border-red-400 tracking-widest uppercase">
                                    Exit Game
                                </button>

                            </div>
                        </div>
                    )}

                    {/* HOW TO PLAY MODAL */}
                    {howToPlayOpen && (
                        <div className="absolute inset-0 z-50 bg-black/80 flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-[#1a120d] border-2 border-[#ffcc00] w-full max-w-sm rounded-2xl flex flex-col shadow-[0_0_30px_rgba(255,204,0,0.3)] animate-pop-in overflow-hidden">
                                
                                <div className="bg-gradient-to-r from-[#8f6e4a] to-[#523b24] p-3 flex items-center justify-between border-b-2 border-[#3d2b19]">
                                    <h2 className="text-[#ffea7c] font-black text-xl font-['Cinzel'] tracking-wider drop-shadow-md">HOW TO PLAY</h2>
                                    <button onClick={() => { fx.playMenuClick(); setHowToPlayOpen(false); }} className="text-white font-bold text-3xl leading-none drop-shadow-md active:scale-90 transition-transform">&times;</button>
                                </div>
                                
                                <div className="p-5 overflow-y-auto max-h-[60vh] space-y-3 font-sans">
                                    <div className="bg-[#2a1f16] p-3 rounded-xl border border-[#3d2b19]">
                                        <h4 className="text-green-400 font-black tracking-wide text-sm mb-1 uppercase font-['Lilita_One']">1. Place Your Bet</h4>
                                        <p className="text-xs text-gray-300 font-semibold leading-relaxed">Use the <strong className="text-white">+</strong> and <strong className="text-white">-</strong> buttons at the bottom to set your total bet amount.</p>
                                    </div>
                                    <div className="bg-[#2a1f16] p-3 rounded-xl border border-[#3d2b19]">
                                        <h4 className="text-blue-400 font-black tracking-wide text-sm mb-1 uppercase font-['Lilita_One']">2. Spin The Reels</h4>
                                        <p className="text-xs text-gray-300 font-semibold leading-relaxed">Tap the <strong className="text-white">SPIN</strong> button. Match 3 identical gems or letters across any of the 5 paylines to win.</p>
                                    </div>
                                    <div className="bg-[#2a1f16] p-3 rounded-xl border border-[#3d2b19]">
                                        <h4 className="text-[#ffcc00] font-black tracking-wide text-sm mb-1 uppercase font-['Lilita_One']">3. Multiplier Reel</h4>
                                        <p className="text-xs text-gray-300 font-semibold leading-relaxed">The 4th reel drops multipliers. Whatever lands in the glowing center frame multiplies your payline wins up to <strong className="text-yellow-400">10X!</strong></p>
                                    </div>
                                    <div className="bg-[#2a1f16] p-3 rounded-xl border border-[#3d2b19]">
                                        <h4 className="text-red-400 font-black tracking-wide text-sm mb-1 uppercase font-['Lilita_One']">4. Wilds</h4>
                                        <p className="text-xs text-gray-300 font-semibold leading-relaxed">Wild symbols act as a substitute for any gem or letter, increasing your chances to strike a big winning combo.</p>
                                    </div>
                                    <p className="text-center text-[10px] text-gray-500 font-bold mt-2 uppercase tracking-widest">100% Provably Fair • RTP 96.5%</p>
                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
